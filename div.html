<!DOCTYPE html>
<html>
<head>
    <title>Division Program</title>
</head>
<body>

<h3>Division of Two Numbers</h3>

<input type="number" id="num1" placeholder="Enter numerator">
<input type="number" id="num2" placeholder="Enter denominator">
<button onclick="divideNumbers()">Divide</button>

<p id="result"></p>

<script>
function divideNumbers() {
    var num1 = document.getElementById("num1").value;
    var num2 = document.getElementById("num2").value;
    var result = document.getElementById("result");

    try {
        if (num2 == 0) {
            throw "Error: Cannot divide by zero";
        }

        var division = num1 / num2;
        result.innerHTML = "Result: " + division;
    }
    catch (e) {
        result.innerHTML = e;
    }
    finally {
        console.log("Division operation completed.");
    }
}
</script>

</body>
</html>
