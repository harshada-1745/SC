<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <head>
  <title>Key Press Color Change</title>
</head>
<body>

<h2>Press any key</h2>

<script>
  document.addEventListener("keydown", function () {
    document.body.style.backgroundColor = "lightblue";
  });
</script>

</body>
</html>
