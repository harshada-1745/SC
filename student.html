<!DOCTYPE html>
<html>
<head>
    <title>Student Class Example</title>
</head>
<body>

<h2>Student Details</h2>

<script>
class Student {
    constructor(rollNo, name, course) {
        this.rollNo = rollNo;
        this.name = name;
        this.course = course;
    }

    display() {
        document.write("Roll No: " + this.rollNo + "<br>");
        document.write("Name: " + this.name + "<br>");
        document.write("Course: " + this.course + "<br><br>");
    }
}

let roll = prompt("Enter Roll Number:");
let name = prompt("Enter Student Name:");
let course = prompt("Enter Course Name");

let student1 = new Student(roll, name, course);

student1.display();
</script>

</body>
</html>
