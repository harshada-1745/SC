<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <head>
    <title>Mouse Event</title>
</head>
<body>

<button 
    onmouseover="showMsg()" 
    onmouseout="hideMsg()">
    Move Mouse Over button
</button>
<p id="msg"></p>
<script>
    function showMsg() {
        document.getElementById("msg").innerHTML =
            "Mouse is moved over the button";
    }

    function hideMsg() {
        document.getElementById("msg").innerHTML = "";
    }
</script>

</body>
</html>
