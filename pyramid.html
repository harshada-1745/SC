<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>5-Level Star Pyramid</h3>

<script>
    let levels = 5; 

    for (let i = 1; i <= levels; i++) {
        let row = "";

        for (let j = 1; j <= levels - i; j++) {
            row += " ";
        }
        
        for (let k = 1; k <= 2 * i - 1; k++) {
            row += "*";
        }
        document.write(row + "<br>");
    }
</script>

</body>
</html>
